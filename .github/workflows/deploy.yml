name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django tests
        env:
          SECRET_KEY: test-secret-key
          DEBUG: 'True'
          ALLOWED_HOSTS: 127.0.0.1,localhost,testserver
        run: python manage.py test

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Prepare SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [[ -n "${DEPLOY_KNOWN_HOSTS:-}" ]]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          fi

      - name: Deploy on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_VENV_PATH: ${{ secrets.DEPLOY_VENV_PATH }}
          APP_SERVICE: ${{ secrets.APP_SERVICE }}
          NGINX_SERVICE: ${{ secrets.NGINX_SERVICE }}
          DJANGO_COLLECTSTATIC: ${{ secrets.DJANGO_COLLECTSTATIC }}
          DJANGO_RUN_DEPLOY_CHECK: ${{ secrets.DJANGO_RUN_DEPLOY_CHECK }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" /bin/bash <<EOF
          set -euo pipefail
          export APP_DIR="${DEPLOY_PATH}"
          export VENV_PATH="${DEPLOY_VENV_PATH:-${DEPLOY_PATH}/venv}"
          export APP_SERVICE="${APP_SERVICE}"
          export NGINX_SERVICE="${NGINX_SERVICE:-}"
          export BRANCH="${DEPLOY_BRANCH}"
          export DJANGO_COLLECTSTATIC="${DJANGO_COLLECTSTATIC:-1}"
          export DJANGO_RUN_DEPLOY_CHECK="${DJANGO_RUN_DEPLOY_CHECK:-1}"
          bash "${DEPLOY_PATH}/scripts/deploy.sh"
          EOF
